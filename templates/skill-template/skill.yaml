# CheatCodes Skill Manifest
# ─────────────────────────────────────────────────────────────────────────────
# Replace every <placeholder> value before submitting a new skill.
# Full schema documentation: docs/skill-manifest-schema.md
# ─────────────────────────────────────────────────────────────────────────────

# ── Identity ─────────────────────────────────────────────────────────────────
name: "<skill-name>"                    # kebab-case, unique within category
display_name: "<Human Readable Name>"
version: "1.0.0"                        # semver  (MAJOR.MINOR.PATCH)
status: "beta"                          # beta | stable | deprecated | archived

# ── Taxonomy ─────────────────────────────────────────────────────────────────
category: "<category>"                  # productivity | automation | communication | data | devops | security | custom
tags: []                                # free-form keywords for search / discovery

# ── Description ──────────────────────────────────────────────────────────────
description: |
  One-sentence summary of what this skill does.

long_description: |
  A more detailed description that explains the skill's purpose, what problem
  it solves, how it works, and any important caveats.

# ── Authorship ───────────────────────────────────────────────────────────────
author: "<github-username>"
maintainers: []                         # list of GitHub usernames
created: "<YYYY-MM-DD>"
updated: "<YYYY-MM-DD>"
license: "MIT"

# ── Requirements & Dependencies ──────────────────────────────────────────────
min_requirements:
  # tools: [python>=3.9, node>=18]       # optional runtime requirements
  # platforms: [linux, macos, windows]

dependencies: []                        # other CheatCodes skills this skill builds on
# - skill: productivity/task-planner
#   version: ">=1.0.0"

# ── Usage ────────────────────────────────────────────────────────────────────
usage: |
  Step-by-step instructions on how to use the skill.

examples:
  - title: "Basic example"
    description: "Describe what this example demonstrates."
    code: |
      # paste example here

# ── Versioning ───────────────────────────────────────────────────────────────
changelog:
  - version: "1.0.0"
    date: "<YYYY-MM-DD>"
    status: "beta"
    changes:
      - "Initial release"

# ── Community ────────────────────────────────────────────────────────────────
community:
  replacements: []       # skills this is designed to replace/upgrade
  variations: []         # org-specific skins or variants derived from this skill
  feedback_issue: ""     # GitHub issue number collecting beta feedback
