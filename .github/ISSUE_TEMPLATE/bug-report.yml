name: "🐛 Bug Report"
description: Report a problem with a skill
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue! Please fill out the details below.

  - type: dropdown
    id: skill
    attributes:
      label: Affected Skill
      description: Which skill has the bug?
      options:
        - mbr-engine
        - mbr-engine/threshold-governance
        - mbr-engine/portability
        - mbr-engine/onboarding
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: other-skill
    attributes:
      label: Other Skill (if applicable)
      placeholder: skill-name

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
      placeholder: A clear description of the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run command X
        2. With input Y
        3. See error Z
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: The skill should have...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead, it...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System information
      placeholder: |
        - OS: macOS 14.0
        - Python: 3.11
        - Skill version: 2.0.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Any relevant error messages or logs
      render: shell
      placeholder: |
        Paste error logs here...
