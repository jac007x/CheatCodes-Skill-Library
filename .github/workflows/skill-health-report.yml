# =============================================================================
# CheatCodes Skill Library — Skill Health Report
# =============================================================================
# Runs every Monday at 08:00 UTC (and on manual dispatch).
#
# What it does:
#   1. Scores every skill using tools/skill_health_scorer.py
#   2. Writes a dated Markdown report to docs/health-reports/YYYY-MM-DD.md
#   3. Commits the report back to main
#   4. Opens a GitHub Issue if any skill is critical, at-risk, or stale
#      (deduped — skips if an open health-alert issue already exists)
#
# Requires: issues: write + contents: write
# =============================================================================

name: Skill Health Report

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Manual run from the Actions tab

permissions:
  contents: write           # Commit the health report
  issues: write             # Open a health-alert issue if needed

jobs:
  health-report:
    name: Score Skills & Generate Report
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Fetch full git history so skill_health_scorer.py can compute freshness
      # (days since last commit per skill directory).
      # -----------------------------------------------------------------------
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10+
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install PyYAML

      # -----------------------------------------------------------------------
      # Score all skills and write two outputs:
      #   - Markdown report → docs/health-reports/YYYY-MM-DD.md
      #   - JSON            → /tmp/health-report.json (used by alert step)
      # -----------------------------------------------------------------------
      - name: Score all skills and generate report
        id: score
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          REPORT_PATH="docs/health-reports/${TODAY}.md"

          python tools/skill_health_scorer.py --report "$REPORT_PATH"
          python tools/skill_health_scorer.py --json > /tmp/health-report.json

          echo "report_path=${REPORT_PATH}" >> "$GITHUB_OUTPUT"
          echo "today=${TODAY}"             >> "$GITHUB_OUTPUT"

          # Print table to job log for quick review
          python tools/skill_health_scorer.py

      # -----------------------------------------------------------------------
      # Commit the new report file to main.
      # Skips if nothing changed (report already exists for today).
      # -----------------------------------------------------------------------
      - name: Commit health report to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/health-reports/
          git diff --staged --quiet || \
            git commit -m "chore: skill health report ${{ steps.score.outputs.today }}"
          git push

      # -----------------------------------------------------------------------
      # Ensure required labels exist before creating issues.
      # Uses upsert-style: creates the label if it's missing, ignores errors
      # if it already exists.
      # -----------------------------------------------------------------------
      - name: Ensure GitHub labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "health-alert",  color: "e11d48", description: "Auto-generated skill health degradation alert" },
              { name: "automated",     color: "6366f1", description: "Created automatically by CI" },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              } catch (e) {
                if (e.status !== 422) throw e; // 422 = already exists, which is fine
              }
            }

      # -----------------------------------------------------------------------
      # Open a health-alert issue if any skill is critical, at-risk, or stale.
      # Deduped: if an open issue with the `health-alert` label already exists,
      # skip to avoid flooding the issue tracker.
      # -----------------------------------------------------------------------
      - name: Open issue for degraded or stale skills
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require("fs");
            const report = JSON.parse(fs.readFileSync("/tmp/health-report.json", "utf8"));
            const today  = "${{ steps.score.outputs.today }}";

            const critical = report.skills.filter(s => s.status === "critical");
            const atRisk   = report.skills.filter(s => s.status === "at-risk");
            const stale    = report.skills.filter(s => s.is_stale);

            if (!critical.length && !atRisk.length && !stale.length) {
              core.info("All skills healthy — no alert issue needed.");
              return;
            }

            // Dedup check — is there already an open health-alert issue?
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: "health-alert",
              state:  "open",
              per_page: 5,
            });
            if (open.data.length > 0) {
              core.info(`Open health-alert issue already exists: #${open.data[0].number} — skipping.`);
              return;
            }

            // Build issue body
            const lines = [
              `## Weekly Skill Health Alert — ${today}`,
              "",
              `Full report: [docs/health-reports/${today}.md](../blob/main/docs/health-reports/${today}.md)`,
              "",
            ];

            if (critical.length) {
              lines.push("### 💀 Critical — Hard Gate Failure(s)");
              for (const s of critical) {
                const fails = s.hard_failures.map(f => `\`${f.gate_id}\` ${f.message}`).join(", ");
                lines.push(`- **${s.name}** v${s.version}: ${fails}`);
              }
              lines.push("");
            }

            if (atRisk.length) {
              lines.push("### 🔴 At Risk — ≤3 Soft Gates Passing");
              for (const s of atRisk) {
                const missing = s.soft_failures.map(f => `\`${f.gate_id}\``).join(", ");
                lines.push(`- **${s.name}** v${s.version}: ${s.soft_score}/8 soft gates — missing ${missing}`);
              }
              lines.push("");
            }

            if (stale.length) {
              lines.push("### ⏰ Stale — Not Updated in 90+ Days");
              for (const s of stale) {
                lines.push(`- **${s.name}**: last updated ${s.last_modified} (${s.days_stale} days ago)`);
              }
              lines.push("");
            }

            lines.push(
              "> Auto-generated by [skill-health-report](.github/workflows/skill-health-report.yml). " +
              "Close this issue once the flagged skills are addressed."
            );

            const title = [
              "[Health Alert]",
              critical.length ? `${critical.length} critical` : null,
              atRisk.length   ? `${atRisk.length} at-risk`    : null,
              stale.length    ? `${stale.length} stale`       : null,
              "—",
              today,
            ].filter(Boolean).join(" ");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body:   lines.join("\n"),
              labels: ["health-alert", "automated"],
            });

            core.info(`Health alert issue created: ${title}`);
