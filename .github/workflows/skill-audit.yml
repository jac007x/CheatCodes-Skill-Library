name: Skill Library Crew Review

on:
  schedule:
    # Run every Monday at 08:00 UTC (ready for Tue/Wed/Thu review sessions)
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      post_issue:
        description: "Post crew report as a GitHub issue"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  crew-review:
    name: Run automated review crew (Librarian · Scout · Coach)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run crew review
        id: crew
        run: |
          python scripts/crew.py --output /tmp/crew_report.md
          echo "report_path=/tmp/crew_report.md" >> $GITHUB_OUTPUT

      - name: Upload crew report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: crew-review-report-${{ github.run_number }}
          path: /tmp/crew_report.md
          retention-days: 90

      - name: Post crew report as GitHub issue
        if: ${{ github.event_name == 'schedule' || inputs.post_issue == 'true' }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🤖 Weekly Crew Review — ${{ github.run_number }}"
          content-filepath: /tmp/crew_report.md
          labels: |
            audit
            roadmap
            automated
          assignees: jac007x

      - name: Add summary to workflow
        run: cat /tmp/crew_report.md >> $GITHUB_STEP_SUMMARY
